<div class="card">
    <a href="{% url 'core:task' task.id %}">
        {{ task.name }}<br/>
        {{ task.project.name }}<br/>
        {% if task.description %}
            {{ task.description }}<br/>
        {% endif %}
        {%  if task.due_datetime %}
            {{ task.due_datetime }}<br/>
        {% endif %}
    </a>
</div>
