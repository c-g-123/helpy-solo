{% extends 'core/base.html' %}
{% block title %}Projects{% endblock %}

{% block body %}
    <h1>Projects</h1>
    <a href="{% url 'core:create_project' %}">Create Project</a>
    <ul>
        {% for project in projects %}
            <li>
                <a class="card" href="{% url 'core:project' project.id %}">
                    {{ project.name }}
                </a>
            </li>
        {% empty %}
            <p>You have no projects yet.</p>
        {% endfor %}
    </ul>
{% endblock %}
