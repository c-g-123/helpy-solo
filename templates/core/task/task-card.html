<a class="task-card" href="{% url 'core:task' task.id %}">
    <strong>
        {{ task.name }}<br/>
    </strong>
    <small>
        {{ task.project.name }}<br/>
        {% if task.description %}
            {{ task.description }}<br/>
        {% endif %}
        {%  if task.due_datetime %}
            {{ task.due_datetime }}<br/>
        {% endif %}
    </small>
</a>
